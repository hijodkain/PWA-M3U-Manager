<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Reproductor de Stream</title>
  <style>
    body, html {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #000; overflow: hidden;
    }
    #player-container {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 9999; background: #000;
    }
    /* Rotación para iOS en fullscreen */
    .ios-landscape {
      transform: rotate(90deg);
      transform-origin: center center;
      width: 100vh !important;
      height: 100vw !important;
      position: fixed;
      top: 50%;
      left: 50%;
      margin-top: -50vw;
      margin-left: -50vh;
      z-index: 10000;
    }
    #error-message {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: sans-serif;
      font-size: 1.2rem;
      text-align: center;
      background: rgba(0,0,0,0.8);
      padding: 2rem;
      border-radius: 8px;
      z-index: 20000;
    }
    #error-message a {
      color: #818cf8;
      word-break: break-all;
    }
    * { -webkit-tap-highlight-color: transparent; outline: none; }
  </style>
</head>
<body>
  <div id="player-container"></div>
  <div id="error-message"></div>

  <script src="https://cdn.jsdelivr.net/gh/clappr/clappr@latest/dist/clappr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/clappr/dash-shaka-playback@latest/dist/dash-shaka-playback.min.js"></script>

  <script>
    // Leer la URL del stream desde el parámetro ?url=
    const params = new URLSearchParams(window.location.search);
    const streamUrl = params.get('url');

    if (!streamUrl) {
      const errorDiv = document.getElementById('error-message');
      errorDiv.style.display = 'block';
      errorDiv.innerHTML = '<strong>No se proporcionó URL de stream.</strong><br>Usa: <code>/player.html?url=https://tu-stream.m3u8</code>';
    } else {
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      const urlPath = streamUrl.split('?')[0].toLowerCase();
      const isDash = urlPath.endsWith('.mpd');

      let playerInstance = null;
      let yaReintento = false;

      /**
       * Construye y lanza el player.
       * @param {boolean} usarProxy - Si true, todas las peticiones HLS se rutean
       *   a través de /api/proxy para evitar bloqueos CORS.
       */
      function crearPlayer(usarProxy) {
        // Destruir instancia anterior si existe
        if (playerInstance) {
          try { playerInstance.destroy(); } catch (e) {}
          playerInstance = null;
          document.getElementById('player-container').innerHTML = '';
        }

        const cfg = {
          parentId: '#player-container',
          plugins: isDash ? [DashShakaPlayback] : [],
          source: streamUrl,
          autoPlay: true,
          width: '100vw',
          height: '100vh',
          mute: false,
          disableVideoTagContextMenu: true
        };

        if (isDash) {
          cfg.shakaConfiguration = {
            preferredAudioLanguage: 'es',
            streaming: { lowLatencyMode: true, jumpLargeGaps: true }
          };
        }

        // Para HLS: si usarProxy=true, interceptar TODAS las peticiones
        // (manifiesto + segmentos .ts) y rutarlas por nuestro proxy propio,
        // que añade las cabeceras CORS necesarias.
        if (!isDash && usarProxy) {
          cfg.playback = {
            hlsjsConfig: {
              xhrSetup: function (xhr, url) {
                // Solo añadir el proxy si la URL no es ya relativa al propio origen
                if (url.startsWith('http://') || url.startsWith('https://')) {
                  xhr.open('GET', '/api/proxy?url=' + encodeURIComponent(url), true);
                }
              }
            }
          };
        }

        playerInstance = new Clappr.Player(cfg);

        // ── Gestos táctiles ──────────────────────────────────────────────
        playerInstance.on(Clappr.Events.PLAYER_READY, function () {
          const video = document.querySelector('#player-container video');
          if (!video) return;

          let lastTap = 0;
          video.addEventListener('touchend', function (e) {
            const now = Date.now();
            const diff = now - lastTap;
            if (diff < 300 && diff > 0) {
              if (playerInstance.core.isFullscreen()) {
                playerInstance.core.exitFullscreen();
              } else {
                playerInstance.core.toggleFullscreen();
              }
              e.preventDefault();
            }
            lastTap = now;
          });

          // Evita pausa involuntaria al tocar una vez
          video.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
          }, true);
        });

        // ── Orientación en fullscreen ────────────────────────────────────
        playerInstance.on('fullscreen', async function (isFullscreen) {
          const contenedor = document.getElementById('player-container');
          if (isFullscreen) {
            if (!isIOS && screen.orientation?.lock) {
              try { await screen.orientation.lock('landscape'); } catch (e) {}
            } else if (isIOS) {
              contenedor.classList.add('ios-landscape');
            }
          } else {
            if (!isIOS && screen.orientation?.unlock) {
              try { screen.orientation.unlock(); } catch (e) {}
            }
            if (isIOS) contenedor.classList.remove('ios-landscape');
          }
        });

        // ── WakeLock ─────────────────────────────────────────────────────
        let wakeLock = null;
        async function activarWakeLock() {
          if ('wakeLock' in navigator) {
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
          }
        }
        playerInstance.on('play', () => activarWakeLock());
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') activarWakeLock();
        });

        // ── Manejo de errores con reintento vía proxy ────────────────────
        playerInstance.on(Clappr.Events.PLAYER_ERROR, function () {
          if (!isDash && !yaReintento) {
            // Primer fallo: reintentar automáticamente con proxy CORS
            yaReintento = true;
            const errorDiv = document.getElementById('error-message');
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = '⏳ Reintentando con proxy CORS…';
            setTimeout(function () {
              errorDiv.style.display = 'none';
              crearPlayer(true);
            }, 800);
          } else {
            // Segundo fallo (con proxy) o stream DASH: mostrar error definitivo
            const errorDiv = document.getElementById('error-message');
            errorDiv.style.display = 'block';
            errorDiv.innerHTML =
              '<strong>No se pudo reproducir el stream.</strong><br>' +
              'El servidor puede estar offline, geo-restringido o no ser compatible con la reproducción web.<br><br>' +
              '<span style="font-size:0.85rem;color:#9ca3af;">URL: <a href="' + streamUrl + '" target="_blank" rel="noopener noreferrer">' + streamUrl + '</a></span>';
          }
        });
      }

      // Lanzar con intento directo primero
      crearPlayer(false);
    }
  </script>
</body>
</html>
