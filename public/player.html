<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reproductor de Stream</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #player-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
      background: #000;
    }
    #video {
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: contain;
    }
    .ios-landscape {
      transform: rotate(90deg);
      transform-origin: center center;
      width: 100vh !important;
      height: 100vw !important;
      position: fixed;
      top: 50%;
      left: 50%;
      margin-top: -50vw;
      margin-left: -50vh;
      z-index: 10000;
    }
    #error-message {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: sans-serif;
      font-size: 1.2rem;
      text-align: center;
      background: rgba(0,0,0,0.8);
      padding: 2rem;
      border-radius: 8px;
      z-index: 20000;
    }
    #error-message a {
      color: #818cf8;
      word-break: break-all;
    }
    #status-badge {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 15000;
      display: none;
      padding: 0.4rem 0.7rem;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.82);
      color: #e5e7eb;
      font-size: 0.8rem;
      letter-spacing: 0.01em;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
    }
    * { -webkit-tap-highlight-color: transparent; outline: none; }
  </style>
</head>
<body>
  <div id="player-container">
    <video id="video" playsinline webkit-playsinline controls autoplay></video>
  </div>
  <div id="status-badge"></div>
  <div id="error-message"></div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.compiled.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const streamUrl = params.get('url');
    const video = document.getElementById('video');
    const playerContainer = document.getElementById('player-container');
    const errorDiv = document.getElementById('error-message');
    const statusBadge = document.getElementById('status-badge');

    let hlsInstance = null;
    let shakaInstance = null;
    let wakeLockSentinel = null;
    let yaReintento = false;
    let lastTap = 0;
    let activeEngine = null;
    let isResettingPlayer = false;

    if (!streamUrl) {
      errorDiv.style.display = 'block';
      errorDiv.innerHTML = '<strong>No se proporcionó URL de stream.</strong><br>Usa: <code>/player.html?url=https://tu-stream.m3u8</code>';
    } else {
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      const urlPath = streamUrl.split('?')[0].toLowerCase();
      const isDash = urlPath.endsWith('.mpd');

      function setStatus(message) {
        if (!message) {
          statusBadge.style.display = 'none';
          statusBadge.textContent = '';
          return;
        }
        statusBadge.textContent = message;
        statusBadge.style.display = 'block';
      }

      function getErrorDetailHtml(detail) {
        if (!detail) return '';
        return '<br><br><span style="font-size:0.85rem;color:#fca5a5;">Detalle técnico: ' + detail + '</span>';
      }

      function showFinalError(detail) {
        setStatus('');
        errorDiv.style.display = 'block';
        errorDiv.innerHTML =
          '<strong>No se pudo reproducir el stream.</strong><br>' +
          'El servidor puede estar offline, geo-restringido o no ser compatible con la reproducción web.<br><br>' +
          getErrorDetailHtml(detail) +
          '<span style="font-size:0.85rem;color:#9ca3af;">URL: <a href="' + streamUrl + '" target="_blank" rel="noopener noreferrer">' + streamUrl + '</a></span>';
      }

      async function activarWakeLock() {
        if (!('wakeLock' in navigator)) return;
        try {
          wakeLockSentinel = await navigator.wakeLock.request('screen');
        } catch (error) {
        }
      }

      async function liberarWakeLock() {
        if (!wakeLockSentinel) return;
        try {
          await wakeLockSentinel.release();
        } catch (error) {
        }
        wakeLockSentinel = null;
      }

      function cleanupPlayers() {
        isResettingPlayer = true;
        activeEngine = null;
        if (hlsInstance) {
          try { hlsInstance.destroy(); } catch (error) {}
          hlsInstance = null;
        }
        if (shakaInstance) {
          try { shakaInstance.destroy(); } catch (error) {}
          shakaInstance = null;
        }
        video.pause();
        video.removeAttribute('src');
        video.load();
        isResettingPlayer = false;
      }

      async function handleFullscreenChange() {
        const isFullscreen = !!document.fullscreenElement;
        if (isFullscreen) {
          if (!isIOS && screen.orientation && screen.orientation.lock) {
            try { await screen.orientation.lock('landscape'); } catch (error) {}
          } else if (isIOS) {
            playerContainer.classList.add('ios-landscape');
          }
        } else {
          if (!isIOS && screen.orientation && screen.orientation.unlock) {
            try { screen.orientation.unlock(); } catch (error) {}
          }
          if (isIOS) {
            playerContainer.classList.remove('ios-landscape');
          }
        }
      }

      async function toggleFullscreen() {
        try {
          if (document.fullscreenElement) {
            await document.exitFullscreen();
          } else if (playerContainer.requestFullscreen) {
            await playerContainer.requestFullscreen();
          }
        } catch (error) {
        }
      }

      function getPlaybackUrl(usarProxy) {
        return usarProxy ? '/api/proxy?url=' + encodeURIComponent(streamUrl) : streamUrl;
      }

      function maybeRetryWithProxy() {
        if (isDash || yaReintento) {
          showFinalError('Fallo tras agotar el reintento por proxy');
          return false;
        }

        yaReintento = true;
        setStatus('Reintentando con proxy CORS...');
        errorDiv.style.display = 'none';
        setTimeout(function () {
          initPlayback(true);
        }, 800);
        return true;
      }

      function bindCommonVideoEvents() {
        video.onplay = function () {
          setStatus('');
          activarWakeLock();
        };

        video.onpause = function () {
          liberarWakeLock();
        };

        video.onwaiting = function () {
          setStatus('Cargando stream...');
        };

        video.onplaying = function () {
          setStatus('');
        };

        video.onerror = function () {
          if (isResettingPlayer) return;

          if (activeEngine === 'hls' || activeEngine === 'shaka') {
            return;
          }

          maybeRetryWithProxy();
        };
      }

      function isLikelyDirectMedia(url) {
        return /\.(mp4|m4v|webm|ogg|ogv|mov|mp3|aac)(?:$|[?#])/i.test(url);
      }

      async function initDash(source) {
        activeEngine = 'shaka';
        if (!window.shaka || !window.shaka.Player) {
          errorDiv.style.display = 'block';
          errorDiv.innerHTML = '<strong>Error al cargar el motor DASH.</strong>';
          return;
        }

        window.shaka.polyfill.installAll();

        if (!window.shaka.Player.isBrowserSupported()) {
          errorDiv.style.display = 'block';
          errorDiv.innerHTML = '<strong>Este navegador no soporta reproducción DASH.</strong>';
          return;
        }

        shakaInstance = new window.shaka.Player(video);
        shakaInstance.configure({
          preferredAudioLanguage: 'es',
          streaming: {
            lowLatencyMode: true,
            jumpLargeGaps: true,
          },
        });

        shakaInstance.addEventListener('error', function () {
          showFinalError('Error fatal de Shaka Player');
        });

        try {
          await shakaInstance.load(source);
          setStatus('');
          await video.play();
        } catch (error) {
          showFinalError(error && error.message ? error.message : 'Fallo cargando stream DASH');
        }
      }

      async function initNativeHls(source) {
        activeEngine = 'native';
        video.src = source;
        try {
          await video.play();
          setStatus('');
        } catch (error) {
        }
      }

      async function initDirectMedia(source) {
        activeEngine = 'native';
        video.src = source;
        try {
          await video.play();
          setStatus('');
        } catch (error) {
        }
      }

      async function initHlsJs(source) {
        if (!window.Hls || !window.Hls.isSupported()) {
          showFinalError('HLS.js no está disponible en este navegador');
          return;
        }

        activeEngine = 'hls';

        hlsInstance = new window.Hls({
          enableWorker: true,
          lowLatencyMode: false,
          backBufferLength: 90,
          maxBufferLength: 30,
          maxMaxBufferLength: 60,
          manifestLoadingTimeOut: 20000,
          levelLoadingTimeOut: 20000,
          fragLoadingTimeOut: 30000,
          xhrSetup: function (xhr) {
            xhr.withCredentials = false;
          },
        });

        hlsInstance.attachMedia(video);
        hlsInstance.on(window.Hls.Events.MEDIA_ATTACHED, function () {
          hlsInstance.loadSource(source);
        });

        hlsInstance.on(window.Hls.Events.MANIFEST_PARSED, async function () {
          setStatus('');
          try {
            await video.play();
          } catch (error) {
          }
        });

        hlsInstance.on(window.Hls.Events.ERROR, function (_, data) {
          if (!data || !data.fatal) return;

          const detail = [data.type, data.details].filter(Boolean).join(' / ');

          switch (data.type) {
            case window.Hls.ErrorTypes.NETWORK_ERROR:
              if (!maybeRetryWithProxy()) {
                showFinalError(detail);
              }
              break;
            case window.Hls.ErrorTypes.MEDIA_ERROR:
              try {
                hlsInstance.recoverMediaError();
              } catch (error) {
                if (!maybeRetryWithProxy()) {
                  showFinalError(detail);
                }
              }
              break;
            default:
              if (!maybeRetryWithProxy()) {
                showFinalError(detail);
              }
              break;
          }
        });
      }

      async function initPlayback(usarProxy) {
        cleanupPlayers();
        errorDiv.style.display = 'none';
        setStatus('Inicializando reproductor...');

        const source = getPlaybackUrl(usarProxy);

        if (isDash) {
          await initDash(source);
          return;
        }

        if (isLikelyDirectMedia(streamUrl)) {
          await initDirectMedia(source);
          return;
        }

        if (video.canPlayType('application/vnd.apple.mpegurl')) {
          await initNativeHls(source);
          return;
        }

        await initHlsJs(source);
      }

      bindCommonVideoEvents();

      video.addEventListener('touchend', function (event) {
        const now = Date.now();
        const diff = now - lastTap;
        if (diff < 300 && diff > 0) {
          toggleFullscreen();
          event.preventDefault();
        }
        lastTap = now;
      });

      document.addEventListener('fullscreenchange', handleFullscreenChange);
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible' && !video.paused) {
          activarWakeLock();
        }
      });
      window.addEventListener('beforeunload', function () {
        liberarWakeLock();
        cleanupPlayers();
      });

      const esMixedContent = streamUrl.startsWith('http://') && window.location.protocol === 'https:';
      initPlayback(esMixedContent);
    }
  </script>
</body>
</html>
